<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Rally</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0D0D0D;
      color: #FFFFFF;
      font-family: 'Inter', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }

    .container {
      width: 100%;
      max-width: 400px;
    }

    .wordmark {
      display: block;
      font-size: 20px;
      font-weight: 700;
      letter-spacing: 0.12em;
      color: #CCFF00;
      text-transform: uppercase;
      margin-bottom: 48px;
    }

    h1 {
      font-size: 32px;
      font-weight: 700;
      letter-spacing: -1px;
      color: #FFFFFF;
      margin-bottom: 8px;
    }

    .subtitle {
      font-size: 16px;
      color: #6B6B6B;
      line-height: 1.6;
      margin-bottom: 32px;
    }

    label {
      display: block;
      font-size: 11px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.12em;
      color: #6B6B6B;
      margin-bottom: 8px;
    }

    input[type="password"] {
      width: 100%;
      height: 52px;
      background: #1A1A1A;
      border: 1px solid rgba(224, 224, 224, 0.2);
      border-radius: 10px;
      padding: 0 16px;
      font-size: 16px;
      font-family: 'Inter', sans-serif;
      color: #FFFFFF;
      outline: none;
      transition: border-color 0.15s;
      margin-bottom: 16px;
    }

    input[type="password"]:focus {
      border-color: rgba(204, 255, 0, 0.4);
    }

    .field-error {
      font-size: 13px;
      color: #6B6B6B;
      margin-bottom: 16px;
      display: none;
    }

    button {
      width: 100%;
      height: 52px;
      background: #CCFF00;
      border: none;
      border-radius: 10px;
      font-size: 16px;
      font-weight: 700;
      font-family: 'Inter', sans-serif;
      color: #0D0D0D;
      cursor: pointer;
      letter-spacing: 0.2px;
      transition: opacity 0.15s;
    }

    button:disabled {
      opacity: 0.6;
      cursor: not-allowed;
    }

    #success-section {
      text-align: center;
      display: none;
    }

    .success-mark {
      width: 52px;
      height: 52px;
      background: #CCFF00;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      margin: 0 auto 24px;
      font-size: 24px;
      color: #0D0D0D;
      font-weight: 700;
    }

    #success-section h2 {
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 8px;
    }

    #success-section p {
      font-size: 16px;
      color: #6B6B6B;
      line-height: 1.6;
    }
  </style>
</head>
<body>
  <div class="container">
    <span class="wordmark">Rally</span>

    <div id="loading-section">
      <p class="subtitle">Verifying reset link...</p>
    </div>

    <div id="error-section" style="display:none">
      <h1>Link expired.</h1>
      <p class="subtitle">This reset link is invalid or has expired. Request a new one from the app.</p>
    </div>

    <div id="form-section" style="display:none">
      <h1>New password.</h1>
      <p class="subtitle">Choose a strong password for your Rally account.</p>

      <label for="password">New password</label>
      <input type="password" id="password" placeholder="At least 8 characters" autocomplete="new-password" />

      <label for="confirm">Confirm password</label>
      <input type="password" id="confirm" placeholder="Repeat new password" autocomplete="new-password" />

      <p id="field-error" class="field-error"></p>

      <button id="submit-btn" onclick="handleSubmit()">Set new password</button>
    </div>

    <div id="success-section">
      <div class="success-mark">✓</div>
      <h2>Password updated.</h2>
      <p>Your password has been changed. Open the Rally app to sign in.</p>
    </div>
  </div>

  <script>
    const SUPABASE_URL = 'https://sbosbkbrkicpyktrzgjo.supabase.co';
    const SUPABASE_ANON_KEY = 'sb_publishable_XLcXQNlCkK6xgNUkcn1wZQ_Lfp_rq5F';

    const client = window.supabase.createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const sections = ['loading-section', 'error-section', 'form-section', 'success-section'];
    function show(id) {
      sections.forEach(s => document.getElementById(s).style.display = 'none');
      document.getElementById(id).style.display = 'block';
    }

    (async function init() {
      // PKCE flow — token arrives as ?token_hash=...&type=recovery
      const params = new URLSearchParams(window.location.search);
      const tokenHash = params.get('token_hash');
      const type = params.get('type');

      if (tokenHash && type === 'recovery') {
        const { error } = await client.auth.verifyOtp({ token_hash: tokenHash, type: 'recovery' });
        show(error ? 'error-section' : 'form-section');
        return;
      }

      // Implicit flow — token arrives as #access_token=...&type=recovery in hash
      // Supabase client detects this automatically and fires PASSWORD_RECOVERY
      const timeout = setTimeout(() => {
        sub.unsubscribe();
        show('error-section');
      }, 6000);

      const { data: { subscription: sub } } = client.auth.onAuthStateChange((event) => {
        if (event === 'PASSWORD_RECOVERY' || event === 'SIGNED_IN') {
          clearTimeout(timeout);
          sub.unsubscribe();
          show('form-section');
        }
      });
    })();

    async function handleSubmit() {
      const password = document.getElementById('password').value;
      const confirm = document.getElementById('confirm').value;
      const errorEl = document.getElementById('field-error');
      const btn = document.getElementById('submit-btn');

      errorEl.style.display = 'none';

      if (password.length < 8) {
        errorEl.textContent = 'Password must be at least 8 characters.';
        errorEl.style.display = 'block';
        return;
      }
      if (password !== confirm) {
        errorEl.textContent = 'Passwords do not match.';
        errorEl.style.display = 'block';
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Updating...';

      const { error } = await client.auth.updateUser({ password });

      if (error) {
        errorEl.textContent = 'Something went wrong. Try again.';
        errorEl.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Set new password';
        return;
      }

      show('success-section');
    }
  </script>
</body>
</html>
